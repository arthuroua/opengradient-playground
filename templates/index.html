<!DOCTYPE html>
<html>

<head>

<title>OpenGradient Intelligence Terminal</title>

<!-- ethers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>

body{
background:#04060c;
color:#00f2ff;
font-family:monospace;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.title{
font-size:40px;
text-align:center;
margin-bottom:40px;
text-shadow:0 0 20px #00f2ff;
}

button{
padding:10px 20px;
margin:5px;
background:#00f2ff;
border:none;
cursor:pointer;
box-shadow:0 0 10px #00f2ff;
}

textarea{
width:100%;
height:150px;
background:#0b0f1a;
color:white;
border:1px solid #00f2ff;
padding:15px;
}

.result{
margin-top:20px;
background:#0b0f1a;
padding:20px;
border:1px solid #00f2ff;
min-height:120px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#0b0f1a;
padding:15px;
border:1px solid #00f2ff;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
OpenGradient Intelligence Terminal
</div>

<div id="wallet">
Wallet: not connected
</div>

<button onclick="connect()">Connect Wallet</button>
<button onclick="disconnect()">Disconnect</button>

<h3>AI Playground</h3>

<textarea id="prompt">
Explain zero knowledge proofs simply
</textarea>

<br>

<button onclick="runModel()">Run Model</button>

<div class="result" id="result">
Model output...
</div>

<h3>Model Hub Explorer</h3>

<button onclick="loadModels()">Load Models</button>

<div class="grid" id="models"></div>

</div>

<script>

let provider
let signer
let account

async function connect(){

if(typeof window.ethereum === "undefined"){
alert("Install MetaMask")
return
}

provider = new ethers.providers.Web3Provider(window.ethereum)

await provider.send("eth_requestAccounts", [])

signer = provider.getSigner()

account = await signer.getAddress()

document.getElementById("wallet").innerText =
"Wallet: "+account

}

function disconnect(){

provider=null
signer=null
account=null

document.getElementById("wallet").innerText =
"Wallet: disconnected"

}

async function runModel(){

const prompt=document.getElementById("prompt").value

const res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
})

const data=await res.json()

document.getElementById("result").innerText =
data.response || data.error

}

async function loadModels(){

const res=await fetch("/models")

const models=await res.json()

const grid=document.getElementById("models")

grid.innerHTML=""

models.forEach(m=>{

const el=document.createElement("div")

el.className="card"

el.innerText=m

grid.appendChild(el)

})

}

</script>

</body>
</html>
