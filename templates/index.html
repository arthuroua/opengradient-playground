<!DOCTYPE html>
<html>

<head>

<title>OpenGradient Neon AI Terminal</title>

<style>

body{
background:#03040a;
font-family:monospace;
color:#00f2ff;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:50px;
}

.title{
font-size:44px;
text-align:center;
margin-bottom:40px;
text-shadow:0 0 25px #00f2ff;
}

.panel{
background:#0b0f1a;
border:1px solid #00f2ff;
border-radius:10px;
padding:25px;
margin-bottom:30px;
}

textarea{
width:100%;
height:150px;
background:#0b0f1a;
color:white;
border:1px solid #00f2ff;
padding:15px;
font-size:16px;
border-radius:6px;
}

button{
margin-top:15px;
margin-right:10px;
padding:12px 22px;
background:#00f2ff;
border:none;
cursor:pointer;
border-radius:6px;
box-shadow:0 0 12px #00f2ff;
}

button:hover{
box-shadow:0 0 30px #00f2ff;
}

.result{
margin-top:20px;
background:#0b0f1a;
padding:20px;
border-radius:10px;
border:1px solid #00f2ff;
min-height:120px;
color:white;
}

.log{
margin-top:15px;
font-size:14px;
color:#7aa2c9;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:15px;
}

.card{
background:#0b0f1a;
padding:15px;
border:1px solid #00f2ff;
border-radius:8px;
}

.card:hover{
box-shadow:0 0 20px #00f2ff;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
OpenGradient Neon AI Terminal
</div>

<div class="panel">

<h3>💧 Testnet Faucet</h3>

<button onclick="getETH()">Get Base Sepolia ETH</button>
<button onclick="getOPG()">Get OPG Tokens</button>

</div>

<div class="panel">

<h3>🧠 AI Playground</h3>

<textarea id="prompt">
Explain zero knowledge proofs simply
</textarea>

<br>

<button onclick="runModel()">Run Model</button>
<button onclick="copy()">Copy</button>
<button onclick="clearOutput()">Clear</button>

<div class="result" id="result">
Model output will appear here...
</div>

<div class="log" id="log">
Logs...
</div>

</div>

<div class="panel">

<h3>🧭 Model Explorer</h3>

<div class="grid">

<div class="card">openai/gpt-4o</div>
<div class="card">google/gemini-2.5-pro</div>
<div class="card">anthropic/claude-3.7-sonnet</div>
<div class="card">x-ai/grok-4-fast</div>
<div class="card">openai/o4-mini</div>
<div class="card">google/gemini-2.5-flash</div>

</div>

</div>

</div>

<script>

function log(msg){
document.getElementById("log").innerText = msg
}

async function runModel(){

log("Sending request...")

const prompt =
document.getElementById("prompt").value

try{

const res =
await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
})

const data = await res.json()

document.getElementById("result").innerText =
data.response || data.error

log("Response received")

}catch(e){

log("Error: "+e)

}

}

function copy(){

const text =
document.getElementById("result").innerText

navigator.clipboard.writeText(text)

log("Copied to clipboard")

}

function clearOutput(){

document.getElementById("result").innerText=""

log("Output cleared")

}

function getETH(){

window.open(
"https://www.coinbase.com/faucets/base-sepolia-faucet",
"_blank"
)

log("Opened ETH faucet")

}

function getOPG(){

window.open(
"https://hub.opengradient.ai/faucet",
"_blank"
)

log("Opened OPG faucet")

}

</script>

</body>
</html>
