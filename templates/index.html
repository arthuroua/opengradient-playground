<!DOCTYPE html>
<html>

<head>

<title>OpenGradient Intelligence Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>

body{
background:#04060c;
color:#00f2ff;
font-family:monospace;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.title{
font-size:42px;
text-align:center;
margin-bottom:40px;
text-shadow:0 0 20px #00f2ff;
}

.wallet{
margin-bottom:20px;
}

button{
padding:10px 20px;
margin:5px;
background:#00f2ff;
border:none;
cursor:pointer;
box-shadow:0 0 10px #00f2ff;
}

textarea{
width:100%;
height:140px;
background:#0b0f1a;
color:white;
border:1px solid #00f2ff;
padding:15px;
}

.result{
margin-top:20px;
background:#0b0f1a;
padding:20px;
border:1px solid #00f2ff;
min-height:120px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#0b0f1a;
padding:15px;
border:1px solid #00f2ff;
}

.log{
margin-top:20px;
font-size:14px;
color:#7aa2c9;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
OpenGradient Intelligence Terminal
</div>

<div class="wallet">

<div id="wallet">Wallet: not connected</div>

<div id="balance">Balance: -</div>

<button onclick="connect()">Connect Wallet</button>
<button onclick="disconnect()">Disconnect</button>
<button onclick="approve()">Approve OPG</button>
<button onclick="loadBalance()">Refresh Balance</button>

</div>

<h3>Testnet Faucet</h3>

<button onclick="getETH()">Get ETH</button>
<button onclick="getOPG()">Get OPG</button>

<h3>AI Playground</h3>

<textarea id="prompt">
Explain zero knowledge proofs simply
</textarea>

<br>

<button onclick="runModel()">Run Model</button>
<button onclick="copy()">Copy</button>
<button onclick="clearOutput()">Clear</button>

<div class="result" id="result">
Model output...
</div>

<h3>Model Hub Explorer</h3>

<button onclick="loadModels()">Load Models</button>

<div class="grid" id="models"></div>

<div class="log" id="log">
Logs...
</div>

</div>

<script>

let provider
let signer
let account

function log(msg){
document.getElementById("log").innerText=msg
}

async function connect(){

if(!window.ethereum){
alert("Install MetaMask")
return
}

const accounts = await window.ethereum.request({
method:"eth_requestAccounts"
})

account = accounts[0]

provider = new ethers.providers.Web3Provider(window.ethereum)

signer = provider.getSigner()

document.getElementById("wallet").innerText =
"Wallet: "+account

log("Wallet connected")

await loadBalance()

}

function disconnect(){

account=null
provider=null
signer=null

document.getElementById("wallet").innerText =
"Wallet: disconnected"

document.getElementById("balance").innerText="Balance: -"

log("Wallet disconnected")

}

async function loadBalance(){

if(!provider) return

const ethBalance = await provider.getBalance(account)

const eth = ethers.utils.formatEther(ethBalance)

const token = new ethers.Contract(
"0x240b09731D96979f50B2C649C9CE10FcF9C7987F",
["function balanceOf(address owner) view returns(uint256)"],
provider
)

const raw = await token.balanceOf(account)

const opg = ethers.utils.formatUnits(raw,18)

document.getElementById("balance").innerText =
"ETH: "+eth+" | OPG: "+opg

}

async function approve(){

if(!signer){
alert("Connect wallet first")
return
}

const token = new ethers.Contract(
"0x240b09731D96979f50B2C649C9CE10FcF9C7987F",
["function approve(address spender,uint256 amount) public returns(bool)"],
signer
)

const spender="0x000000000022D473030F116dDEE9F6B43aC78BA3"

const amount=ethers.utils.parseUnits("1000",18)

log("Sending approval...")

const tx=await token.approve(spender,amount)

log("TX: "+tx.hash)

await tx.wait()

log("Approval confirmed")

}

async function runModel(){

const prompt=document.getElementById("prompt").value

const res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
})

const data=await res.json()

document.getElementById("result").innerText =
data.response || data.error

}

function copy(){

const text=document.getElementById("result").innerText

navigator.clipboard.writeText(text)

log("Copied to clipboard")

}

function clearOutput(){

document.getElementById("result").innerText=""

log("Output cleared")

}

function getETH(){

window.open(
"https://www.coinbase.com/faucets/base-sepolia-faucet",
"_blank"
)

}

function getOPG(){

window.open(
"https://hub.opengradient.ai/faucet",
"_blank"
)

}

async function loadModels(){

const res=await fetch("/models")

const models=await res.json()

const grid=document.getElementById("models")

grid.innerHTML=""

models.forEach(m=>{

const el=document.createElement("div")

el.className="card"

el.innerText=m

grid.appendChild(el)

})

}

</script>

</body>
</html>
