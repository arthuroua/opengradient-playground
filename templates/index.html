<!DOCTYPE html>
<html>

<head>

<title>OpenGradient Neon AI Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>

body{
background:#03040a;
font-family:monospace;
color:#00f2ff;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:50px;
}

.title{
font-size:42px;
text-align:center;
margin-bottom:40px;
text-shadow:0 0 25px #00f2ff;
}

.panel{
background:#0b0f1a;
border:1px solid #00f2ff;
border-radius:10px;
padding:25px;
margin-bottom:30px;
}

button{
padding:10px 20px;
margin:5px;
background:#00f2ff;
border:none;
cursor:pointer;
box-shadow:0 0 10px #00f2ff;
}

button:hover{
box-shadow:0 0 25px #00f2ff;
}

textarea{
width:100%;
height:150px;
background:#0b0f1a;
color:white;
border:1px solid #00f2ff;
padding:15px;
}

.result{
margin-top:20px;
background:#0b0f1a;
padding:20px;
border:1px solid #00f2ff;
min-height:120px;
}

.log{
margin-top:15px;
font-size:14px;
color:#7aa2c9;
}

.wallet{
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
OpenGradient Neon AI Terminal
</div>

<div class="panel">

<div class="wallet" id="wallet">
Wallet: not connected
</div>

<div id="balance">
Balance: -
</div>

<button onclick="connect()">Connect Wallet</button>
<button onclick="disconnect()">Disconnect</button>
<button onclick="loadBalance()">Refresh Balance</button>
<button onclick="approve()">Approve OPG</button>

</div>

<div class="panel">

<h3>💧 Faucet</h3>

<button onclick="getETH()">Get Base Sepolia ETH</button>
<button onclick="getOPG()">Get OPG Tokens</button>

</div>

<div class="panel">

<h3>AI Playground</h3>

<textarea id="prompt">
Explain zero knowledge proofs simply
</textarea>

<br>

<button onclick="runModel()">Run Model</button>
<button onclick="copy()">Copy</button>
<button onclick="clearOutput()">Clear</button>

<div class="result" id="result">
Model output...
</div>

<div class="log" id="log">
Logs...
</div>

</div>

</div>

<script>

let provider
let signer
let account

const OPG =
"0x240b09731D96979f50B2C649C9CE10FcF9C7987F"

const PERMIT2 =
"0x000000000022D473030F116dDEE9F6B43aC78BA3"

function log(msg){
document.getElementById("log").innerText = msg
}

async function connect(){

if(!window.ethereum){

alert("Install MetaMask")
return

}

const accounts =
await window.ethereum.request({
method:"eth_requestAccounts"
})

account = accounts[0]

provider =
new ethers.providers.Web3Provider(window.ethereum)

signer = provider.getSigner()

document.getElementById("wallet").innerText =
"Wallet: " + account

log("Wallet connected")

await loadBalance()

}

function disconnect(){

provider=null
signer=null
account=null

document.getElementById("wallet").innerText =
"Wallet: disconnected"

document.getElementById("balance").innerText =
"Balance: -"

log("Wallet disconnected")

}

async function loadBalance(){

if(!provider) return

const ethBalance =
await provider.getBalance(account)

const eth =
ethers.utils.formatEther(ethBalance)

const token =
new ethers.Contract(
OPG,
["function balanceOf(address owner) view returns(uint256)"],
provider
)

const raw =
await token.balanceOf(account)

const opg =
ethers.utils.formatUnits(raw,18)

document.getElementById("balance").innerText =
"ETH: "+eth+" | OPG: "+opg

}

async function approve(){

if(!signer){

alert("Connect wallet first")
return

}

const token =
new ethers.Contract(
OPG,
[
"function approve(address spender,uint256 amount) public returns(bool)"
],
signer
)

const amount =
ethers.utils.parseUnits("1000",18)

log("Sending approval...")

const tx =
await token.approve(PERMIT2, amount)

log("TX: "+tx.hash)

await tx.wait()

log("Approval confirmed")

}

async function runModel(){

const prompt =
document.getElementById("prompt").value

const res =
await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
})

const data =
await res.json()

document.getElementById("result").innerText =
data.response || data.error

}

function copy(){

const text =
document.getElementById("result").innerText

navigator.clipboard.writeText(text)

log("Copied to clipboard")

}

function clearOutput(){

document.getElementById("result").innerText=""

log("Output cleared")

}

function getETH(){

window.open(
"https://www.coinbase.com/faucets/base-sepolia-faucet",
"_blank"
)

}

function getOPG(){

window.open(
"https://hub.opengradient.ai/faucet",
"_blank"
)

}

</script>

</body>
</html>
