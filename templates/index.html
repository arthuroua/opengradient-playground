<!DOCTYPE html>
<html>

<head>

<title>OpenGradient AI Playground</title>

<style>

body{
background:#05070d;
color:#00f2ff;
font-family:monospace;
margin:0;
}

.header{
text-align:center;
padding:40px;
font-size:36px;
}

.playground{
max-width:900px;
margin:auto;
background:#0b0f1a;
padding:20px;
border-radius:10px;
}

textarea{
width:100%;
height:120px;
background:#04060c;
color:white;
border:none;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
background:#00f2ff;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:6px;
}

.response{
margin-top:20px;
background:#04060c;
padding:15px;
border-radius:6px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="header">
OpenGradient AI Playground
</div>

<div class="playground">

Enter prompt:

<textarea id="prompt"></textarea>

<button onclick="runModel()">
Run Model
</button>

<div class="response" id="response"></div>

</div>

<script>

async function runModel(){

let prompt=document.getElementById("prompt").value

let res = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})
})

let data=await res.json()

document.getElementById("response").innerText =
data.response || data.error

}

</script>

</body>

</html>
