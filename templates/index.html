<!DOCTYPE html>
<html>

<head>

<title>OpenGradient AI Playground</title>

<style>

body{
background:#05070d;
color:#00f2ff;
font-family:monospace;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

textarea{
width:100%;
height:150px;
background:#0b0f1a;
color:white;
border:none;
padding:15px;
font-size:16px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#00f2ff;
border:none;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:30px;
background:#0b0f1a;
padding:20px;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>OpenGradient AI Playground</h1>

<textarea id="prompt">Explain zero knowledge proofs simply</textarea>

<br>

<button onclick="run()">Run Model</button>

<div class="result" id="result"></div>

</div>

<script>

async function run(){

const prompt = document.getElementById("prompt").value

const res = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
})

const data = await res.json()

document.getElementById("result").innerText = data.response

}

</script>

</body>

</html>
