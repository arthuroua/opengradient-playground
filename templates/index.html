<!DOCTYPE html>
<html>

<head>

<title>OpenGradient AI Terminal</title>

<style>

body{
background:#03040a;
font-family:monospace;
color:#00f2ff;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:60px;
}

.title{
font-size:42px;
text-align:center;
margin-bottom:40px;
color:#00f2ff;
text-shadow:0 0 20px #00f2ff;
}

textarea{
width:100%;
height:160px;
background:#0b0f1a;
color:white;
border:1px solid #00f2ff;
border-radius:8px;
padding:20px;
font-size:16px;
outline:none;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:16px;
background:#00f2ff;
border:none;
border-radius:6px;
cursor:pointer;
box-shadow:0 0 15px #00f2ff;
}

button:hover{
box-shadow:0 0 30px #00f2ff;
}

.result{
margin-top:40px;
background:#0b0f1a;
padding:30px;
border-radius:10px;
color:white;
min-height:120px;
border:1px solid #00f2ff;
}

.log{
margin-top:20px;
color:#7aa2c9;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
OpenGradient Neon AI Terminal
</div>

<textarea id="prompt">
Explain zero knowledge proofs simply
</textarea>

<br>

<button onclick="runModel()">Run Model</button>

<div class="result" id="result">
Model output will appear here...
</div>

<div class="log" id="log">
Logs...
</div>

</div>

<script>

async function runModel(){

document.getElementById("log").innerText="Sending request..."

const prompt = document.getElementById("prompt").value

try{

const res = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt:prompt})
})

document.getElementById("log").innerText="Response received"

const data = await res.json()

document.getElementById("result").innerText =
data.response || data.error

}
catch(err){

document.getElementById("log").innerText="Error: "+err

}

}

</script>

</body>
</html>
