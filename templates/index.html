<!DOCTYPE html>
<html>

<head>

<title>OpenGradient AI Playground</title>

<style>

body{
background:#05070d;
color:#00f2ff;
font-family:monospace;
margin:0;
}

.header{
text-align:center;
font-size:36px;
padding:40px;
}

.terminal{
max-width:900px;
margin:auto;
background:#0b0f1a;
padding:20px;
border-radius:10px;
}

textarea{
width:100%;
height:120px;
background:black;
color:#00f2ff;
border:1px solid #00f2ff;
padding:10px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#00f2ff;
border:none;
cursor:pointer;
}

pre{
margin-top:20px;
background:black;
padding:15px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="header">
OpenGradient AI Playground
</div>

<div class="terminal">

<textarea id="prompt">
Explain zero knowledge proofs simply
</textarea>

<br>

<button onclick="runModel()">
Run Model
</button>

<pre id="output"></pre>

</div>

<script>

async function runModel(){

const prompt = document.getElementById("prompt").value

const res = await fetch("/chat",{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})

})

const data = await res.json()

document.getElementById("output").innerText =
data.response || data.error

}

</script>

</body>

</html>
